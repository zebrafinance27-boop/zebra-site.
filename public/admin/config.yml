# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: zebrafinance27-boop/zebra-site
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/5148c3b0-b644-4d6d-a416-62bbec3e63b8/pkce
  auth_token_endpoint: /sites/5148c3b0-b644-4d6d-a416-62bbec3e63b8/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://zebra-finance.co.il

# ====== תוכן האתר ======
media_folder: "public/images/uploads"
public_folder: "/images/uploads"
locale: "he"

collections:
  - name: "blog"
    label: "מאמרים"
    label_singular: "מאמר"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "כותרת", name: "title", widget: "string" }
      - { label: "תיאור קצר (לקידום ולתצוגה בגוגל)", name: "description", widget: "text" }
      - { label: "תאריך פרסום", name: "pubDate", widget: "datetime", date_format: "DD/MM/YYYY", time_format: false, format: "YYYY-MM-DD" }
      - { label: "תמונה ראשית", name: "cover", widget: "image", required: false, hint: "תמונה שתופיע בראש המאמר וברשתות החברתיות" }
      - { label: "טיוטה (לא יתפרסם)", name: "draft", widget: "boolean", default: false }
      - { label: "תוכן המאמר", name: "body", widget: "markdown" }

  - name: "settings"
    label: "הגדרות אתר"
    files:
      - name: "partners"
        label: "לוגואים של גופים פיננסיים"
        file: "src/data/partners.json"
        format: "json"
        fields:
          - { label: "כותרת הסקשן", name: "title", widget: "string" }
          - label: "לוגואים"
            name: "items"
            widget: "list"
            label_singular: "לוגו"
            summary: "{{fields.name}}"
            fields:
              - { label: "שם הגוף", name: "name", widget: "string" }
              - { label: "לוגו", name: "logo", widget: "image" }

  - name: "testimonials"
    label: "המלצות לקוחות"
    label_singular: "המלצה"
    folder: "src/content/testimonials"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{fields.name}} — {{#if approved}}מאושר{{else}}ממתין לאישור{{/if}}"
    fields:
      - { label: "מאושר לפרסום", name: "approved", widget: "boolean", default: false, hint: "רק המלצות מאושרות מופיעות באתר. החליפו ל-כן כדי לפרסם." }
      - { label: "שם", name: "name", widget: "string" }
      - { label: "עיר", name: "city", widget: "string", required: false }
      - { label: "דירוג", name: "rating", widget: "number", default: 5, min: 1, max: 5, value_type: "int" }
      - { label: "תאריך", name: "date", widget: "datetime", date_format: "DD/MM/YYYY", time_format: false, format: "YYYY-MM-DD", required: false }
      - { label: "תוכן ההמלצה", name: "body", widget: "text" }
